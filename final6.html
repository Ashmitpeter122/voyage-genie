       @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');

:root {

body {

/* Advanced Glassmorphism */
.auth-card {
    background: rgba(30, 41, 59, 0.7);

.btn-glass {

}

.btn-glass:hover {
    transform: translateY(-2px);

}


/* Centering Engine */
.overlay-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;             /* Magic for centering */
    align-items: center;       /* Vertical center */

}
.hidden {
    display: none !important;
}
#setup-page:not(.hidden) {
    display: flex !important;
    opacity: 1 !important;
}

/* Glassmorphism for the Inner Cards */
.auth-card {
    width: 90%;
    max-width: 400px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 3rem;
    padding: 2.5rem;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}
/* Floating Animation for the Genie */
@keyframes glow {
    0%, 100% { filter: drop-shadow(0 0 5px rgba(59, 130, 246, 0.5)); }

}

.genie-float {
    animation: floating 3s ease-in-out infinite, glow 3s ease-in-out infinite;

/* Custom Date Picker Styling for Dark Theme */
input[type="date"]::-webkit-calendar-picker-indicator {

}

/* Field Group Labels */
.field-label {

/* Pulsing Generation Button */
.btn-generate {

.btn-generate::after {
    content: '';

    left: -50%;

    transition: opacity 0.3s;
}

}

<script>
function toggleChat() {
    const chat = document.getElementById('chat-container');
    console.log("Chat button clicked!"); 
    
    if (!chat) {
        console.error("Error: chat-container not found in HTML!");
        return;
    }

    // This checks the current display state correctly even on the first click
    const isVisible = window.getComputedStyle(chat).display === 'flex';
    
    if (isVisible) {
        chat.style.display = 'none';
    } else {
        chat.style.display = 'flex';
    }
} 

	 
    // --- GLOBAL DATA ---
    let appData = { src: "", dst: "", days: 1, mode: "aerial", hotel: 5000, mapInstance: null };

    // --- TRANSITION ENGINE ---
    function goToSetup() {
        const login = document.getElementById('login-page');
        const setup = document.getElementById('setup-page');
        
        if (login && setup) {
            login.style.opacity = '0'; 
            setTimeout(() => {
                login.style.display = 'none';
                setup.classList.remove('hidden'); 
                setup.style.display = 'flex';     
                setTimeout(() => setup.style.opacity = '1', 50);
            }, 500);
        }
    }

  // --- NEW GLOBAL STATE ---
let isSignUpMode = false; 

function toggleToRegister() {
    isSignUpMode = !isSignUpMode;
    const regFields = document.getElementById('register-fields');
    const mainBtn = document.getElementById('auth-main-btn'); // Make sure your button has this ID
    const title = document.getElementById('auth-title'); // Make sure your h2 has this ID
    const footerLink = document.getElementById('auth-toggle-link');

    if (isSignUpMode) {
        regFields.classList.remove('hidden');
        title.innerHTML = 'Register<span class="text-blue-600">Genie</span>';
        mainBtn.innerText = 'Create Account';
        footerLink.innerText = 'Sign In';
    } else {
        regFields.classList.add('hidden');
        title.innerHTML = 'Voyage<span class="text-blue-600">Genie</span>';
        mainBtn.innerText = 'Enter Portal';
        footerLink.innerText = 'Create Account';
    }
}

async function handleAuthSubmit() {
    const email = document.getElementById('log-email').value;
    const pass = document.getElementById('log-pass').value;
    const endpoint = isSignUpMode ? 'http://localhost:3000/api/register' : 'http://localhost:3000/api/login';
    
    try {
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password: pass })
        });

       if (response.ok) {
    console.log("Login successful, launching Setup Page...");
    
    // 1. Completely remove the login page from view
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('login-page').style.display = 'none';

    // 2. Force the setup page to show
    const setup = document.getElementById('setup-page');
    if (setup) {
        setup.classList.remove('hidden'); // Remove the "display: none"
        setup.style.display = 'flex';     // Force flexbox centering
        
        // Trigger the V54 fade-in effect
        setTimeout(() => {
            setup.style.opacity = '1';
        }, 10);
    } else {
        console.error("Error: Element with ID 'setup-page' not found!");
    }
}
    } catch (error) {
        console.error("Connection Error:", error);
        alert("Server connection failed.");
    }
}    function handleGoogleLogin(event) {
        const btn = event.currentTarget;
        btn.innerHTML = `<i class="fas fa-circle-notch animate-spin text-blue-600"></i> <span>Connecting...</span>`;
        btn.disabled = true;
        setTimeout(goToSetup, 1200);
    }

  async function startVoyage() {
    // 1. Capture Inputs
    const src = document.getElementById('in-src').value;
    const dst = document.getElementById('in-dst').value;
    const daysInput = document.getElementById('in-days').value;
    appData.days = parseInt(daysInput) || 1; 
	renderTab('itinerary');
    if(!src || !dst) return alert("Fill all details!");

    appData.src = src;
    appData.dst = dst;

    // 2. Clear the UI Deck
    const setupPage = document.getElementById('setup-page');
    setupPage.classList.add('hidden');
    setupPage.style.display = 'none';

    // 3. Reveal Dashboard
    const dashboard = document.getElementById('dashboard');
    dashboard.classList.remove('hidden');
    dashboard.style.display = 'block';
    
    document.getElementById('top-pill').innerText = `${src} ➔ ${dst}`;

    // 4. Wait for DOM update, then init Map
    setTimeout(async () => {
        await initMap();
        if (appData.mapInstance) {
            appData.mapInstance.invalidateSize();
        }
    }, 300);

    	
}

    // --- RENDER FUNCTIONS ---
    async function initMap() {
        if (appData.mapInstance) appData.mapInstance.remove();
        appData.mapInstance = L.map('map', {zoomControl: false}).setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(appData.mapInstance);
        try {
            const [r1, r2] = await Promise.all([
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${appData.src}`).then(r => r.json()),
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${appData.dst}`).then(r => r.json())
            ]);
            if (r1[0] && r2[0]) {
                const p1 = [r1[0].lat, r1[0].lon], p2 = [r2[0].lat, r2[0].lon];
